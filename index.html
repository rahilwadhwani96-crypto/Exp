<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Manager</title>
  <style>
    :root { 
      --bg: #0a0e27; 
      --card: #151d36; 
      --primary: #3b82f6; 
      --success: #10b981; 
      --danger: #ef4444; 
      --warning: #f59e0b; 
      --text: #f8fafc; 
      --muted: #94a3b8; 
      --border: #2d3748; 
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    
    body { 
      background: linear-gradient(135deg, var(--bg) 0%, #1a1f3a 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
      min-height: 100vh;
    }
    
    .container { max-width: 500px; margin: 0 auto; }
    
    .header { text-align: center; margin-bottom: 32px; padding-top: 12px; }
    .title { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
    .subtitle { font-size: 14px; color: var(--muted); }
    
    .card { 
      background: var(--card);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      animation: fadeIn 0.4s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .dashboard {
      background: linear-gradient(135deg, var(--card) 0%, #1a2445 100%);
    }
    
    .label { 
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    
    .amount { 
      font-size: 48px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 24px;
      letter-spacing: -1px;
    }
    
    .progress-bar { 
      height: 10px;
      background: var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    
    .progress-fill { 
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #6366f1);
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 8px;
    }
    
    .progress-labels { 
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 20px;
    }
    
    .stats { 
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    
    .stat { 
      text-align: center;
      padding: 12px;
    }
    
    .stat-num { 
      font-size: 32px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 4px;
    }
    
    .stat-label { 
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    
    .section-title { 
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 16px;
      margin-top: 28px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .group-title { 
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .expense-card { 
      background: linear-gradient(135deg, var(--card) 0%, #1a2340 100%);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeIn 0.4s ease-out;
    }
    
    .expense-card:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.1);
    }
    
    .expense-header { 
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    
    .expense-icon { 
      font-size: 32px;
    }
    
    .expense-info { 
      flex: 1;
      text-align: left;
    }
    
    .expense-name { 
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    
    .expense-meta { 
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 12px;
    }
    
    .expense-amount { 
      font-size: 20px;
      font-weight: 800;
      color: var(--primary);
      text-align: right;
    }
    
    .badge { 
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 12px;
    }
    
    .badge-overdue { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }
    .badge-today { background: rgba(245, 158, 11, 0.15); color: #fcd34d; }
    .badge-tomorrow { background: rgba(245, 158, 11, 0.12); color: #fdba74; }
    .badge-upcoming { background: rgba(59, 130, 246, 0.15); color: #93c5fd; }
    
    .button { 
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    
    .btn-primary { 
      background: linear-gradient(135deg, var(--primary), #6366f1);
      color: white;
    }
    
    .btn-success { 
      background: var(--success);
      color: white;
      padding: 10px 14px;
      font-size: 13px;
    }
    
    .btn-warning { 
      background: var(--warning);
      color: #000;
    }
    
    .btn-danger { 
      background: var(--danger);
      color: white;
    }
    
    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }
    
    .button:hover { 
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
    }
    
    .button:active { 
      transform: scale(0.98);
    }
    
    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .button-group.full { 
      grid-template-columns: 1fr;
    }
    
    .empty { 
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    
    .empty-icon { 
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .loading { 
      text-align: center;
      padding: 24px;
      color: var(--muted);
    }
    
    input {
      width: 100%;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 12px;
      font-family: inherit;
      transition: all 0.3s;
    }
    
    input::placeholder { color: var(--muted); }
    input:focus { 
      outline: none;
      border-color: var(--primary);
      background: #1a2445;
    }
    
    .history-item {
      background: var(--card);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeIn 0.4s ease-out;
    }
    
    .history-info { 
      text-align: left;
      flex: 1;
    }
    
    .history-date { 
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    
    .history-comment { 
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    
    .history-amount { 
      font-size: 16px;
      font-weight: 800;
      color: var(--success);
      text-align: right;
    }
    
    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--success);
      color: #86efac;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      animation: fadeIn 0.3s ease-out;
    }

    @media (max-width: 600px) {
      .title { font-size: 28px; }
      .amount { font-size: 40px; }
      .card { padding: 20px; }
      .button-group { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">💰 Expense Manager</div>
    <div class="subtitle">Track your finances effortlessly</div>
  </div>

  <div class="card dashboard">
    <div class="label">💸 Remaining this month</div>
    <div class="amount" id="remaining">₹0</div>
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div class="progress-labels">
      <span id="paidLabel">₹0 paid</span>
      <span id="totalLabel">₹0 total</span>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="pendingCount">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="overdueCount">0</div>
        <div class="stat-label">Overdue</div>
      </div>
    </div>
  </div>

  <div id="successMessage"></div>

  <div class="section-title">📋 Expenses</div>
  <div id="expenses" class="loading">Loading expenses...</div>

  <div class="section-title">➕ Add Extra Expense</div>
  <div class="card">
    <input type="number" id="amount" placeholder="Amount (₹)" min="1">
    <input type="text" id="comment" placeholder="Description (optional)">
    <button class="button btn-success" id="addBtn">Add Expense</button>
  </div>

  <div class="section-title">📜 Recent Expenses</div>
  <div id="history"></div>

  <div class="section-title">⚙️ Actions</div>
  <div class="button-group full">
    <button class="button btn-primary" id="refreshBtn">🔄 Refresh Data</button>
  </div>
  <div class="button-group">
    <button class="button btn-warning" id="nextBtn">📅 Next Month</button>
    <button class="button btn-danger" id="resetBtn">Reset Paid</button>
  </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1J6MZXem7uMEQRigxR-gKSAvkI60IX3X4EutydUQf_vM/export?format=csv";
let allExpenses = [];
let paidItems = JSON.parse(localStorage.getItem('paidItems') || '[]');
let extraExpenses = JSON.parse(localStorage.getItem('extraExpenses') || '[]');

function parseCSV(text) {
  const lines = text.split('\n');
  const headers = lines[0].split(',');
  const rows = [];
  
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const obj = {};
    const values = lines[i].split(',');
    headers.forEach((header, idx) => {
      obj[header.trim()] = values[idx] ? values[idx].trim() : '';
    });
    rows.push(obj);
  }
  return rows;
}

async function loadData() {
  try {
    const response = await fetch(CSV_URL);
    const csv = await response.text();
    const rows = parseCSV(csv);
    
    let remaining = 0, paid = 0, overdue = 0, pending = 0, expenses = [];
    allExpenses = [];
    
    rows.forEach(row => {
      const expense = row['Expense'] || '';
      const amount = Number(row['Amount']) || 0;
      const dueDate = row['Due date'] || '';
      const paidValue = row['Paid'] || '';
      const daysLeft = Number(row['Days Left']) || 0;
      const code = row['Code'] || '';
      const icon = row['Icon'] || '💰';
      
      if (!expense || expense === 'TOTAL' || !code) return;
      
      const isPaidLocally = paidItems.includes(code);
      
      if ((!paidValue || paidValue === '') && !isPaidLocally) {
        pending++;
        remaining += amount;
        if (daysLeft < 0) overdue++;
        expenses.push({ expense, amount, dueDate, daysLeft, code, icon, id: code });
        allExpenses.push({ expense, amount, dueDate, daysLeft, code, icon, id: code });
      } else {
        paid += amount;
      }
    });
    
    expenses.sort((a, b) => a.daysLeft - b.daysLeft);
    displayData({ remaining, paid, overdue, pending, expenses });
  } catch (e) {
    console.error(e);
    document.getElementById("expenses").innerHTML = '<div class="empty">⚠️ Error: ' + e.message + '</div>';
  }
}

function displayData(data) {
  const remaining = Number(data.remaining) || 0;
  const paid = Number(data.paid) || 0;
  const total = remaining + paid;
  const percent = total > 0 ? (paid / total) * 100 : 0;

  document.getElementById("remaining").textContent = "₹" + remaining.toLocaleString("en-IN");
  document.getElementById("progress").style.width = Math.min(100, percent) + "%";
  document.getElementById("paidLabel").textContent = "₹" + paid.toLocaleString("en-IN") + " paid";
  document.getElementById("totalLabel").textContent = "₹" + total.toLocaleString("en-IN") + " total";
  document.getElementById("pendingCount").textContent = data.pending || 0;
  document.getElementById("overdueCount").textContent = data.overdue || 0;

  if (data.expenses.length === 0) {
    document.getElementById("expenses").innerHTML = '<div class="empty"><div class="empty-icon">🎉</div><strong>All Clear!</strong><p style="margin-top: 8px; font-size: 13px;">No pending expenses this month.</p></div>';
  } else {
    const groups = { overdue: [], today: [], tomorrow: [], upcoming: [] };
    data.expenses.forEach(e => {
      if (e.daysLeft < 0) groups.overdue.push(e);
      else if (e.daysLeft === 0) groups.today.push(e);
      else if (e.daysLeft === 1) groups.tomorrow.push(e);
      else groups.upcoming.push(e);
    });

    let html = "";
    if (groups.overdue.length > 0) html += '<div class="group-title">🔴 Overdue</div>' + groups.overdue.map(e => makeCard(e, "overdue")).join("");
    if (groups.today.length > 0) html += '<div class="group-title">🟠 Due Today</div>' + groups.today.map(e => makeCard(e, "today")).join("");
    if (groups.tomorrow.length > 0) html += '<div class="group-title">🟡 Due Tomorrow</div>' + groups.tomorrow.map(e => makeCard(e, "tomorrow")).join("");
    if (groups.upcoming.length > 0) html += '<div class="group-title">🔵 Upcoming</div>' + groups.upcoming.map(e => makeCard(e, "upcoming")).join("");
    
    document.getElementById("expenses").innerHTML = html;
    
    document.querySelectorAll(".mark-paid").forEach(btn => {
      btn.addEventListener("click", function(e) {
        e.preventDefault();
        const code = this.getAttribute("data-code");
        markPaid(code);
      });
    });
  }

  loadHistory();
}

function makeCard(e, type) {
  const badgeClass = "badge-" + type;
  const badgeText = type === "overdue" ? "🔴 OVERDUE" : type === "today" ? "🟠 DUE TODAY" : type === "tomorrow" ? "🟡 DUE TOMORROW" : "🔵 " + e.daysLeft + " DAYS";
  const date = new Date(e.dueDate).toLocaleDateString("en-IN");
  
  return `<div class="expense-card">
    <div class="expense-header">
      <div class="expense-info">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
          <div class="expense-icon">${e.icon}</div>
          <div>
            <div class="expense-name">${e.expense}</div>
            <div class="expense-meta">
              <span>${date}</span>
              <span>•</span>
              <span>${e.daysLeft} days</span>
            </div>
          </div>
        </div>
        <div class="badge ${badgeClass}">${badgeText}</div>
      </div>
      <div class="expense-amount">₹${Number(e.amount).toLocaleString("en-IN")}</div>
    </div>
    <button class="button btn-success mark-paid" data-code="${e.code}">✓ Mark Paid</button>
  </div>`;
}

function markPaid(code) {
  if (!paidItems.includes(code)) {
    paidItems.push(code);
    localStorage.setItem('paidItems', JSON.stringify(paidItems));
    showSuccess("✓ Marked as paid!");
    setTimeout(loadData, 300);
  }
}

function addExtra() {
  const amt = document.getElementById("amount").value;
  const cmt = document.getElementById("comment").value;
  if (!amt || amt <= 0) { alert("Please enter a valid amount"); return; }
  
  const extra = { date: new Date().toISOString(), amount: Number(amt), comment: cmt || "Extra expense" };
  extraExpenses.push(extra);
  localStorage.setItem('extraExpenses', JSON.stringify(extraExpenses));
  
  document.getElementById("amount").value = "";
  document.getElementById("comment").value = "";
  
  showSuccess("✓ Expense added locally!");
  setTimeout(loadHistory, 300);
}

function loadHistory() {
  if (extraExpenses.length === 0) {
    document.getElementById("history").innerHTML = '<div class="empty"><p style="font-size: 13px;">No extra expenses added yet.</p></div>';
    return;
  }
  
  let html = "";
  const sorted = [...extraExpenses].sort((a, b) => new Date(b.date) - new Date(a.date));
  sorted.slice(0, 10).forEach(item => {
    const date = new Date(item.date).toLocaleDateString("en-IN");
    const amount = Number(item.amount) || 0;
    html += `<div class="history-item">
      <div class="history-info">
        <div class="history-date">${date}</div>
        <div class="history-comment">${item.comment}</div>
      </div>
      <div class="history-amount">₹${amount.toLocaleString("en-IN")}</div>
    </div>`;
  });
  document.getElementById("history").innerHTML = html;
}

function showSuccess(msg) {
  const div = document.getElementById("successMessage");
  div.innerHTML = `<div class="success-message">${msg}</div>`;
  setTimeout(() => div.innerHTML = "", 2000);
}

document.getElementById("refreshBtn").onclick = loadData;
document.getElementById("addBtn").onclick = addExtra;
document.getElementById("nextBtn").onclick = () => alert("📅 Open Google Sheet and update all due dates to next month, then refresh this app.");
document.getElementById("resetBtn").onclick = () => { if(confirm("Reset all paid entries?")) { paidItems = []; localStorage.setItem('paidItems', '[]'); loadData(); } };

window.addEventListener("load", loadData);
setInterval(loadData, 30000);
</script>
</body>
</html>
