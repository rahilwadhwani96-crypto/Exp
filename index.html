<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Manager</title>
  <style>
    :root { 
      --bg-dark: #000000;
      --bg-card: #0d0d0d;
      --gold: #d4af37;
      --gold-light: #e8c547;
      --green: #10b981;
      --green-light: #6ee7b7;
      --red: #ef4444;
      --red-light: #fca5a5;
      --text: #ffffff;
      --muted: #9ca3af;
      --border: #1f2937;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    
    body { 
      background: linear-gradient(135deg, var(--bg-dark) 0%, #0a0a0a 100%);
      color: var(--text);
      font-family: 'Segoe UI', -apple-system, sans-serif;
      padding: 16px;
      min-height: 100vh;
    }
    
    .container { max-width: 520px; margin: 0 auto; }
    
    .header { text-align: center; margin-bottom: 36px; padding-top: 16px; }
    .title { 
      font-size: 36px; 
      font-weight: 900; 
      margin-bottom: 8px; 
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }
    .subtitle { font-size: 14px; color: var(--muted); }
    
    .card { 
      background: var(--bg-card);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
      border: 1.5px solid var(--border);
      animation: fadeIn 0.4s ease-out;
      box-shadow: 0 8px 32px rgba(212, 175, 55, 0.08);
    }
    
    .card.dashboard {
      border: 1.5px solid var(--gold);
      background: linear-gradient(135deg, var(--bg-card) 0%, #1a1a1a 100%);
      box-shadow: 0 8px 32px rgba(212, 175, 55, 0.15);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .label { 
      font-size: 11px;
      color: var(--gold);
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    
    .amount { 
      font-size: 52px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px;
      letter-spacing: -1px;
    }
    
    .progress-bar { 
      height: 12px;
      background: var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 14px;
      border: 1px solid rgba(212, 175, 55, 0.2);
    }
    
    .progress-fill { 
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.4);
    }
    
    .progress-labels { 
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 20px;
    }
    
    .stats { 
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    
    .stat { 
      text-align: center;
      padding: 12px;
    }
    
    .stat-num { 
      font-size: 32px;
      font-weight: 900;
      color: var(--gold);
      margin-bottom: 4px;
    }
    
    .stat-label { 
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    
    .section-title { 
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 16px;
      margin-top: 28px;
      color: var(--gold);
      letter-spacing: -0.5px;
    }
    
    .group-title { 
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
      margin-top: 20px;
    }
    
    .expense-card { 
      background: var(--bg-card);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeIn 0.4s ease-out;
    }
    
    .expense-card:hover {
      transform: translateY(-2px);
      border-color: var(--gold);
      box-shadow: 0 8px 24px rgba(212, 175, 55, 0.12);
    }
    
    .expense-header { 
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    
    .expense-icon { 
      font-size: 32px;
      margin-right: 12px;
    }
    
    .expense-info { 
      flex: 1;
    }
    
    .expense-name { 
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }
    
    .expense-meta { 
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 12px;
    }
    
    .expense-amount { 
      font-size: 22px;
      font-weight: 900;
      color: var(--gold);
      text-align: right;
    }
    
    .badge { 
      display: inline-block;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 12px;
    }
    
    .badge-overdue { 
      background: rgba(239, 68, 68, 0.15); 
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .badge-today { 
      background: rgba(212, 175, 55, 0.15); 
      color: var(--gold);
      border: 1px solid rgba(212, 175, 55, 0.3);
    }
    .badge-tomorrow { 
      background: rgba(212, 175, 55, 0.1); 
      color: var(--gold-light);
      border: 1px solid rgba(212, 175, 55, 0.2);
    }
    .badge-upcoming { 
      background: rgba(16, 185, 129, 0.15); 
      color: #6ee7b7;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    
    .button { 
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    
    .btn-primary { 
      background: linear-gradient(135deg, #d4af37 0%, #e8c547 50%, #d4af37 100%);
      color: #000;
      box-shadow: 0 4px 16px rgba(212, 175, 55, 0.3);
      border: 1px solid rgba(232, 197, 71, 0.4);
    }
    
    .btn-primary:hover {
      background: linear-gradient(135deg, #e8c547 0%, #d4af37 50%, #e8c547 100%);
      box-shadow: 0 8px 24px rgba(212, 175, 55, 0.5);
    }
    
    .btn-success { 
      background: linear-gradient(135deg, #10b981 0%, #6ee7b7 50%, #10b981 100%);
      color: white;
      padding: 10px 14px;
      font-size: 13px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      border: 1px solid rgba(110, 231, 183, 0.3);
    }
    
    .btn-success:hover {
      background: linear-gradient(135deg, #6ee7b7 0%, #10b981 50%, #6ee7b7 100%);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
    }
    
    .btn-warning { 
      background: linear-gradient(135deg, #d4af37 0%, #e8c547 50%, #d4af37 100%);
      color: #000;
      box-shadow: 0 4px 16px rgba(212, 175, 55, 0.3);
      border: 1px solid rgba(232, 197, 71, 0.4);
    }
    
    .btn-warning:hover {
      background: linear-gradient(135deg, #e8c547 0%, #d4af37 50%, #e8c547 100%);
      box-shadow: 0 8px 24px rgba(212, 175, 55, 0.5);
    }
    
    .btn-danger { 
      background: linear-gradient(135deg, #ef4444 0%, #fca5a5 50%, #ef4444 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
      border: 1px solid rgba(252, 165, 165, 0.3);
    }
    
    .btn-danger:hover {
      background: linear-gradient(135deg, #fca5a5 0%, #ef4444 50%, #fca5a5 100%);
      box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
    }
    
    .button:active { 
      transform: scale(0.98);
    }
    
    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .button-group.full { 
      grid-template-columns: 1fr;
    }
    
    .empty { 
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    
    .empty-icon { 
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .loading { 
      text-align: center;
      padding: 24px;
      color: var(--muted);
    }
    
    input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 12px;
      font-family: inherit;
      transition: all 0.3s;
    }
    
    input::placeholder { color: var(--muted); }
    input:focus { 
      outline: none;
      border-color: var(--gold);
      background: #1a1a1a;
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.1);
    }
    
    .history-item {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeIn 0.4s ease-out;
    }
    
    .history-info { flex: 1; }
    .history-date { 
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .history-comment { 
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .history-amount { 
      font-size: 16px;
      font-weight: 800;
      background: linear-gradient(135deg, #10b981, #6ee7b7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: right;
    }
    
    .success-message {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(110, 231, 183, 0.1));
      border: 2px solid var(--green);
      color: #6ee7b7;
      padding: 16px 20px;
      border-radius: 16px;
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 700;
      animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.2);
      text-align: center;
      letter-spacing: 0.3px;
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .title { font-size: 28px; }
      .amount { font-size: 40px; }
      .card { padding: 20px; }
      .button-group { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">💰 Expense Manager</div>
    <div class="subtitle">Premium financial tracker</div>
  </div>

  <div class="card dashboard">
    <div class="label">✨ Remaining this month</div>
    <div class="amount" id="remaining">₹0</div>
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div class="progress-labels">
      <span id="paidLabel">₹0 paid</span>
      <span id="totalLabel">₹0 total</span>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="pendingCount">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="overdueCount">0</div>
        <div class="stat-label">Overdue</div>
      </div>
    </div>
  </div>

  <div id="successMessage"></div>

  <div class="section-title">📋 Expenses</div>
  <div id="expenses" class="loading">Loading expenses...</div>

  <div class="section-title">➕ Add Extra Expense</div>
  <div class="card">
    <input type="number" id="amount" placeholder="Amount (₹)" min="1">
    <input type="text" id="comment" placeholder="Description (optional)">
    <button class="button btn-success" id="addBtn">+ Add to Sheet</button>
  </div>

  <div class="section-title">📜 Recent Expenses</div>
  <div id="history"></div>

  <div class="section-title">⚙️ Actions</div>
  <div class="button-group full">
    <button class="button btn-primary" id="refreshBtn">🔄 Refresh Data</button>
  </div>
  <div class="button-group">
    <button class="button btn-warning" id="nextBtn">📅 Next Month</button>
    <button class="button btn-danger" id="resetBtn">Reset Paid</button>
  </div>
</div>

<script>
// ==================== IMPORTANT: UPDATE THESE TWO URLs ====================
// 1. CSV_URL - for READING data from Google Sheet (already correct)
const CSV_URL = "https://docs.google.com/spreadsheets/d/1J6MZXem7uMEQRigxR-gKSAvkI60IX3X4EutydUQf_vM/export?format=csv";

// 2. APPS_SCRIPT_URL - for SAVING data to Google Sheet
// Replace this with your deployment URL from Google Apps Script
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQGhrdeSEM-qLFS27nm-Mj2Ucm0u-xAGjaesKjfWdUgNiDUbv62YhLd2sueTQLtL2Xhw/exec";
// =========================================================================

let allExpenses = [];
let paidItems = JSON.parse(localStorage.getItem('paidItems') || '[]');

function parseCSV(text) {
  const lines = text.split('\n');
  const headers = lines[0].split(',');
  const rows = [];
  
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const obj = {};
    const values = lines[i].split(',');
    headers.forEach((header, idx) => {
      obj[header.trim()] = values[idx] ? values[idx].trim() : '';
    });
    rows.push(obj);
  }
  return rows;
}

async function loadData() {
  try {
    const response = await fetch(CSV_URL);
    const csv = await response.text();
    const rows = parseCSV(csv);
    
    let remaining = 0, paid = 0, overdue = 0, pending = 0, expenses = [];
    allExpenses = [];
    
    rows.forEach(row => {
      const expense = row['Expense'] || '';
      const amount = Number(row['Amount']) || 0;
      const dueDate = row['Due date'] || '';
      const paidValue = row['Paid'] || '';
      const daysLeft = Number(row['Days Left']) || 0;
      const code = row['Code'] || '';
      const icon = row['Icon'] || '💰';
      
      if (!expense || expense === 'TOTAL' || !code) return;
      
      if (!paidValue || paidValue === '') {
        pending++;
        remaining += amount;
        if (daysLeft < 0) overdue++;
        expenses.push({ expense, amount, dueDate, daysLeft, code, icon, id: code });
        allExpenses.push({ expense, amount, dueDate, daysLeft, code, icon, id: code });
      } else {
        paid += amount;
      }
    });
    
    expenses.sort((a, b) => a.daysLeft - b.daysLeft);
    displayData({ remaining, paid, overdue, pending, expenses });
  } catch (e) {
    console.error(e);
    document.getElementById("expenses").innerHTML = '<div class="empty">⚠️ Error: ' + e.message + '</div>';
  }
}

function displayData(data) {
  const remaining = Number(data.remaining) || 0;
  const paid = Number(data.paid) || 0;
  const total = remaining + paid;
  const percent = total > 0 ? (paid / total) * 100 : 0;

  document.getElementById("remaining").textContent = "₹" + remaining.toLocaleString("en-IN");
  document.getElementById("progress").style.width = Math.min(100, percent) + "%";
  document.getElementById("paidLabel").textContent = "₹" + paid.toLocaleString("en-IN") + " paid";
  document.getElementById("totalLabel").textContent = "₹" + total.toLocaleString("en-IN") + " total";
  document.getElementById("pendingCount").textContent = data.pending || 0;
  document.getElementById("overdueCount").textContent = data.overdue || 0;

  if (data.expenses.length === 0) {
    document.getElementById("expenses").innerHTML = '<div class="empty"><div class="empty-icon">🎉</div><strong>All Clear!</strong><p style="margin-top: 8px; font-size: 13px; color: var(--muted);">No pending expenses this month.</p></div>';
  } else {
    const groups = { overdue: [], today: [], tomorrow: [], upcoming: [] };
    data.expenses.forEach(e => {
      if (e.daysLeft < 0) groups.overdue.push(e);
      else if (e.daysLeft === 0) groups.today.push(e);
      else if (e.daysLeft === 1) groups.tomorrow.push(e);
      else groups.upcoming.push(e);
    });

    let html = "";
    if (groups.overdue.length > 0) html += '<div class="group-title">🔴 OVERDUE</div>' + groups.overdue.map(e => makeCard(e, "overdue")).join("");
    if (groups.today.length > 0) html += '<div class="group-title">🟡 DUE TODAY</div>' + groups.today.map(e => makeCard(e, "today")).join("");
    if (groups.tomorrow.length > 0) html += '<div class="group-title">✨ DUE TOMORROW</div>' + groups.tomorrow.map(e => makeCard(e, "tomorrow")).join("");
    if (groups.upcoming.length > 0) html += '<div class="group-title">🔵 UPCOMING</div>' + groups.upcoming.map(e => makeCard(e, "upcoming")).join("");
    
    document.getElementById("expenses").innerHTML = html;
    
    document.querySelectorAll(".mark-paid").forEach(btn => {
      btn.addEventListener("click", function(e) {
        e.preventDefault();
        const code = this.getAttribute("data-code");
        markPaid(code);
      });
    });
  }

  loadHistory();
}

function makeCard(e, type) {
  const badgeClass = "badge-" + type;
  const badgeText = type === "overdue" ? "🔴 OVERDUE" : type === "today" ? "🟡 DUE TODAY" : type === "tomorrow" ? "✨ DUE TOMORROW" : "🔵 " + e.daysLeft + " DAYS";
  const date = new Date(e.dueDate).toLocaleDateString("en-IN");
  
  return `<div class="expense-card">
    <div class="expense-header">
      <div style="flex: 1;">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
          <div class="expense-icon">${e.icon}</div>
          <div>
            <div class="expense-name">${e.expense}</div>
            <div class="expense-meta">
              <span>${date}</span>
              <span>•</span>
              <span>${e.daysLeft} days</span>
            </div>
          </div>
        </div>
        <div class="badge ${badgeClass}">${badgeText}</div>
      </div>
      <div class="expense-amount">₹${Number(e.amount).toLocaleString("en-IN")}</div>
    </div>
    <button class="button btn-success mark-paid" data-code="${e.code}">✓ Mark Paid</button>
  </div>`;
}

async function markPaid(code) {
  if (APPS_SCRIPT_URL === "PASTE_YOUR_DEPLOYMENT_URL_HERE") {
    showSuccess("⚠️ Please add Apps Script URL first!");
    return;
  }
  
  try {
    showSuccess("⏳ Saving to sheet...");
    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'markPaid', code: code })
    });
    const result = await response.json();
    if (result.success) {
      showSuccess("✅ " + result.message);
      // Wait 1.5 seconds then refresh data
      setTimeout(loadData, 1500);
    } else {
      showSuccess("❌ Error: " + result.message);
    }
  } catch (e) {
    showSuccess("❌ Error: Check Apps Script URL - " + e.message);
  }
}

async function addExtra() {
  const amt = document.getElementById("amount").value;
  const cmt = document.getElementById("comment").value;
  if (!amt || amt <= 0) { alert("Please enter a valid amount"); return; }
  
  if (APPS_SCRIPT_URL === "PASTE_YOUR_DEPLOYMENT_URL_HERE") {
    showSuccess("⚠️ Please add Apps Script URL first!");
    return;
  }
  
  try {
    showSuccess("⏳ Adding to sheet...");
    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'addExtra', amount: Number(amt), comment: cmt })
    });
    const result = await response.json();
    
    if (result.success) {
      document.getElementById("amount").value = "";
      document.getElementById("comment").value = "";
      showSuccess("✅ " + result.message);
      // Wait 1.5 seconds then refresh data
      setTimeout(loadData, 1500);
    } else {
      showSuccess("❌ Error: " + result.message);
    }
  } catch (e) {
    showSuccess("❌ Error: Check Apps Script URL - " + e.message);
  }
}

function loadHistory() {
  document.getElementById("history").innerHTML = '<div class="empty"><p style="font-size: 13px;">Recent expenses appear here</p></div>';
}

function showSuccess(msg) {
  const div = document.getElementById("successMessage");
  div.innerHTML = `<div class="success-message">${msg}</div>`;
  // Keep message visible for 3.5 seconds
  setTimeout(() => {
    div.innerHTML = "";
  }, 3500);
}

document.getElementById("refreshBtn").onclick = loadData;
document.getElementById("addBtn").onclick = addExtra;
document.getElementById("nextBtn").onclick = () => alert("📅 Update due dates in Google Sheet, then refresh this app.");
document.getElementById("resetBtn").onclick = () => { if(confirm("Reset all paid entries in the sheet?")) { alert("⚠️ Use Google Sheet to reset, then refresh."); } };

window.addEventListener("load", loadData);
setInterval(loadData, 30000);
</script>
</body>
</html>
